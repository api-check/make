name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON
        run: |
          for file in *.json modules/*.json; do
            echo "Validating $file"
            python3 -m json.tool "$file" > /dev/null || exit 1
          done
